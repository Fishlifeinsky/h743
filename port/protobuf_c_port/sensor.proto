syntax = "proto2";

// 示例: 传感器数据上报
message SensorData {
    optional uint32 device_id  = 1;  // 设备ID
    optional float  temperature = 2;  // 温度
    optional float  humidity    = 3;  // 湿度
    optional uint32 timestamp   = 4;  // 时间戳

    enum SensorType {
        TEMP_HUMIDITY = 0;
        PRESSURE      = 1;
        LIGHT         = 2;
    }
    optional SensorType type = 5;
}
